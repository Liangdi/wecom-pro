name: Build Rust Binaries

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x64
            binary_name: wecom-pro
            artifact_name: wecom-pro-linux-x64
            install_musl: false

          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            platform: linux-x64-musl
            binary_name: wecom-pro
            artifact_name: wecom-pro-linux-x64-musl
            install_musl: true

          - os: macos-latest
            target: x86_64-apple-darwin
            platform: darwin-x64
            binary_name: wecom-pro
            artifact_name: wecom-pro-darwin-x64
            install_musl: false

          - os: macos-latest
            target: aarch64-apple-darwin
            platform: darwin-arm64
            binary_name: wecom-pro
            artifact_name: wecom-pro-darwin-arm64
            install_musl: false

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: win32-x64
            binary_name: wecom-pro.exe
            artifact_name: wecom-pro-win32-x64
            install_musl: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: matrix.install_musl == true
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.target }}-
            ${{ runner.os }}-cargo-

      - name: Build for ${{ matrix.platform }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload binary artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary_name }}
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create release archives
        run: |
          mkdir -p release

          # Linux glibc
          tar -czf release/wecom-pro-linux-x64.tar.gz -C artifacts/wecom-pro-linux-x64 wecom-pro

          # Linux musl
          tar -czf release/wecom-pro-linux-x64-musl.tar.gz -C artifacts/wecom-pro-linux-x64-musl wecom-pro

          # macOS x64
          tar -czf release/wecom-pro-darwin-x64.tar.gz -C artifacts/wecom-pro-darwin-x64 wecom-pro

          # macOS ARM64
          tar -czf release/wecom-pro-darwin-arm64.tar.gz -C artifacts/wecom-pro-darwin-arm64 wecom-pro

          # Windows
          cd artifacts/wecom-pro-win32-x64
          zip -r ../../../release/wecom-pro-windows-x64.zip wecom-pro.exe
          cd ../../..

          # Create checksums
          cd release
          sha256sum * > SHA256SUMS
          cd ..

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
