name: Build Rust Binaries

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x64
            binary_name: wecom-pro
            artifact_name: wecom-pro-linux-x64
            install_musl: false

          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            platform: linux-x64-musl
            binary_name: wecom-pro
            artifact_name: wecom-pro-linux-x64-musl
            install_musl: true

          - os: macos-latest
            target: x86_64-apple-darwin
            platform: darwin-x64
            binary_name: wecom-pro
            artifact_name: wecom-pro-darwin-x64
            install_musl: false

          - os: macos-latest
            target: aarch64-apple-darwin
            platform: darwin-arm64
            binary_name: wecom-pro
            artifact_name: wecom-pro-darwin-arm64

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: win32-x64
            binary_name: wecom-pro.exe
            artifact_name: wecom-pro-win32-x64
            install_musl: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: matrix.install_musl == true
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.target }}-
            ${{ runner.os }}-cargo-

      - name: Build for ${{ matrix.platform }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload binary artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary_name }}
          if-no-files-found: error
