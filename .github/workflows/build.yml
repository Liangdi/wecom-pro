name: Build and Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x64
            binary_name: wecom-pro
            artifact_name: wecom-pro-linux-x64

          - os: macos-latest
            target: x86_64-apple-darwin
            platform: darwin-x64
            binary_name: wecom-pro
            artifact_name: wecom-pro-darwin-x64

          - os: macos-latest
            target: aarch64-apple-darwin
            platform: darwin-arm64
            binary_name: wecom-pro
            artifact_name: wecom-pro-darwin-arm64

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: win32-x64
            binary_name: wecom-pro.exe
            artifact_name: wecom-pro-win32-x64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.target }}-
            ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build for ${{ matrix.platform }}
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            cargo build --release --target ${{ matrix.target }}
            mkdir -p packages/${{ matrix.platform }}/bin
            cp target/${{ matrix.target }}/release/wecom-pro.exe packages/${{ matrix.platform }}/bin/
          else
            cargo build --release --target ${{ matrix.target }}
            mkdir -p packages/${{ matrix.platform }}/bin
            cp target/${{ matrix.target }}/release/wecom-pro packages/${{ matrix.platform }}/bin/
          fi
        shell: bash

      - name: Upload binary artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: packages/${{ matrix.platform }}/bin/${{ matrix.binary_name }}
          if-no-files-found: error

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-package
          path: packages/${{ matrix.platform }}/
          if-no-files-found: error

  publish:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Prepare packages
        run: |
          # Copy binaries to their respective packages
          for platform in linux-x64 darwin-x64 darwin-arm64 win32-x64; do
            artifact_name="wecom-pro-$platform"
            if [ "$platform" = "win32-x64" ]; then
              binary_name="wecom-pro.exe"
            else
              binary_name="wecom-pro"
            fi
            cp artifacts/$artifact_name/$binary_name packages/$platform/bin/
            cp -r artifacts/$artifact_name-package/* packages/$platform/
          done

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build npm packages
        run: pnpm run build:npm

      - name: Publish platform-specific packages
        run: |
          for platform in linux-x64 darwin-x64 darwin-arm64 win32-x64; do
            echo "Publishing $platform..."
            cd packages/$platform
            pnpm publish --no-git-checks --access public
            cd ../..
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish main package
        run: |
          echo "Publishing main package..."
          pnpm publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create release archives
        run: |
          mkdir -p release
          for platform in linux-x64 darwin-x64 darwin-arm64 win32-x64; do
            artifact_name="wecom-pro-$platform"
            if [ "$platform" = "win32-x64" ]; then
              binary_name="wecom-pro.exe"
              archive_name="wecom-pro-windows-x64.zip"
            else
              binary_name="wecom-pro"
              archive_name="wecom-pro-$platform.tar.gz"
            fi

            if [ "$platform" = "win32-x64" ]; then
              cd artifacts/$artifact_name
              zip -r ../../../release/$archive_name $binary_name
              cd ../../..
            else
              tar -czf release/$archive_name -C artifacts/$artifact_name $binary_name
            fi
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
